<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">bcd app preview</title>
  <desc id="desc">A preview of the bcd local-first decision interface showing profile, options, prediction, and memory cards.</desc>
  <rect width="1200" height="640" rx="28" fill="#0f172a"/>
  <rect x="36" y="36" width="1128" height="568" rx="22" fill="#f8fafc"/>
  <rect x="36" y="36" width="1128" height="78" rx="22" fill="#111827"/>
  <circle cx="78" cy="75" r="8" fill="#ef4444"/>
  <circle cx="106" cy="75" r="8" fill="#f59e0b"/>
  <circle cx="134" cy="75" r="8" fill="#22c55e"/>
  <text x="178" y="83" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">bcd</text>
  <text x="242" y="82" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">A new choice. A future memory.</text>
  <rect x="70" y="150" width="310" height="390" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="96" y="190" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Profile</text>
  <text x="96" y="226" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">Quiet focus, low-friction tools,</text>
  <text x="96" y="250" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16">and choices that protect energy.</text>
  <rect x="96" y="288" width="232" height="38" rx="19" fill="#e0f2fe"/>
  <text x="116" y="313" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">local profile stored in ~/.bcd</text>
  <rect x="96" y="350" width="238" height="18" rx="9" fill="#dbe3ef"/>
  <rect x="96" y="386" width="204" height="18" rx="9" fill="#dbe3ef"/>
  <rect x="96" y="422" width="252" height="18" rx="9" fill="#dbe3ef"/>
  <rect x="96" y="472" width="154" height="44" rx="10" fill="#111827"/>
  <text x="119" y="501" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Memories</text>
  <rect x="420" y="150" width="710" height="180" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="450" y="190" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Decision</text>
  <text x="450" y="226" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">Where should I work tomorrow afternoon?</text>
  <rect x="450" y="258" width="180" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="482" y="286" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Home desk</text>
  <rect x="650" y="258" width="180" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="686" y="286" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Quiet cafe</text>
  <rect x="850" y="258" width="230" height="44" rx="10" fill="#111827"/>
  <text x="889" y="286" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Ask Codex CLI</text>
  <rect x="420" y="360" width="340" height="180" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="450" y="400" fill="#065f46" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">You would probably choose</text>
  <text x="450" y="452" fill="#064e3b" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Home desk</text>
  <text x="450" y="490" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="16">The memory cards lean toward quiet focus</text>
  <text x="450" y="514" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="16">when work quality matters.</text>
  <rect x="790" y="360" width="340" height="180" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="820" y="400" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Relevant memories</text>
  <rect x="820" y="432" width="250" height="16" rx="8" fill="#dbe3ef"/>
  <rect x="820" y="462" width="278" height="16" rx="8" fill="#dbe3ef"/>
  <rect x="820" y="492" width="190" height="16" rx="8" fill="#dbe3ef"/>
  <rect x="1018" y="388" width="72" height="28" rx="14" fill="#fef3c7"/>
  <text x="1034" y="407" fill="#92400e" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">focus</text>
