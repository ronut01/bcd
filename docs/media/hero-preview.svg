    <text x="914" y="350" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Decision audit</text>
    <rect x="914" y="378" width="84" height="32" rx="16" fill="#ECFDF5"/>
    <rect x="1008" y="378" width="52" height="32" rx="16" fill="#EFF5FF"/>
    <text x="956" y="399" text-anchor="middle" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">high</text>
    <text x="1034" y="399" text-anchor="middle" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">12pt</text>
    <rect x="914" y="434" width="134" height="12" rx="6" fill="#EAF0FF"/>
    <rect x="914" y="458" width="120" height="12" rx="6" fill="#EAF0FF"/>
    <rect x="914" y="494" width="134" height="12" rx="6" fill="#EAF0FF"/>
    <rect x="914" y="518" width="104" height="12" rx="6" fill="#EAF0FF"/>
    <rect x="914" y="554" width="146" height="38" rx="19" fill="url(#accent)"/>
    <text x="987" y="578" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Feedback saved</text>
  </g>
