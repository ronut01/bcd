    <text x="768" y="167" text-anchor="middle" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Question</text>
    <text x="720" y="214" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Pick dinner after a tiring rainy evening.</text>
    <rect x="720" y="236" width="130" height="14" rx="7" fill="#EAF0FF"/>
    <rect x="860" y="236" width="106" height="14" rx="7" fill="#EAF0FF"/>
    <rect x="976" y="236" width="72" height="14" rx="7" fill="#EAF0FF"/>
  </g>

  <g>
