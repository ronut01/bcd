    <rect x="680" y="376" width="150" height="12" rx="6" fill="#EAF0FF"/>
    <rect x="680" y="412" width="150" height="46" rx="14" fill="white" stroke="#E0E8FA"/>
    <text x="698" y="440" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Warm noodle soup</text>
    <rect x="680" y="472" width="150" height="46" rx="14" fill="white" stroke="#E0E8FA"/>
    <text x="698" y="500" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Cozy shared pasta</text>
    <rect x="680" y="532" width="150" height="46" rx="14" fill="white" stroke="#E0E8FA"/>
    <text x="698" y="560" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Quick budget takeout</text>
  </g>

  <g>
